name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-dev python3-pip python3-setuptools python3-wheel python3-cffi libffi-dev python3-openssl libssl-dev cython3 openjdk-17-jdk

    - name: Install Buildozer
      run: |
        pip install buildozer

    - name: Build APK
      run: |
        buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eye-commander-apk
          path: bin/*.apk
